          function initSupabase() {
              if (window.supabase && !sbClient) {
                  sbClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
                  console.log("Supabase client initialized successfully inside DOM Patch.");

          // Global state

          // Helper to get active month and year from DOM
          function getActiveMonthAndYear() {
              let domMonth = null;
              let domYear = null;

              // 1. Try to find month and year from select dropdowns in the DOM (highest priority)
              try {
                  const selects = Array.from(document.querySelectorAll('select')).filter(el => {
                      return !el.closest('#custom-ai-settings-card');
                  });
                  for (const sel of selects) {
                      const val = parseInt(sel.value);
                      if (sel.options.length === 12 && (sel.options[0].text === 'มกราคม' || sel.options[0].textContent.includes('มกราคม'))) {
                          if (!isNaN(val) && val >= 0 && val <= 11) {
                              domMonth = val;
                          }
                      }
                      if (sel.options.length > 0) {
                          const optText = sel.options[0].text || sel.options[0].textContent || '';
                          if (optText.trim().match(/^(25|20)\d{2}$/)) {
                              if (!isNaN(val)) {
                                  domYear = val > 2400 ? val - 543 : val;
                              }
                          }
                      }
                  }
              } catch (err) {
                  console.error("Error reading DOM selects:", err);
              }

              if (domMonth !== null && domYear !== null) {
                  return { month: domMonth, year: domYear };
              }

              // 2. Fallback: Try to find from spans
              try {
                  const spans = Array.from(document.querySelectorAll('span')).filter(el => {
                      return !el.closest('#custom-ai-settings-card');
                  });
                  const monthNames = [
                      'มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
                      'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'
                  ];
                  for (const span of spans) {
                      const text = span.textContent.trim();
                      const foundMonth = monthNames.find(m => text.includes(m));
                      if (foundMonth) {
                          const yearMatch = text.match(/\b(25\d{2}|20\d{2})\b/);
                          if (yearMatch) {
                              const mIdx = monthNames.indexOf(foundMonth);
                              let year = parseInt(yearMatch[0]);
                              if (year > 2400) {
                                  year -= 543;
                              }
                              return { month: mIdx, year: year };
                          }
                      }
                  }
              } catch (err) {
                  console.error("Error reading DOM spans:", err);
              }

              // 3. Last resort fallback: Date calculations
              const now = new Date();
              let m = now.getMonth();
              let y = now.getFullYear();
              if (now.getDate() >= 20) {
                  m += 1;
                  if (m > 11) { m = 0; y += 1; }
              }
              return { month: m, year: y };
          }

          // Fetch route presets from DB
          async function fetchDBInfo() {
              if (!sbClient) return;
              try {
                  const period = getActiveMonthAndYear();
                  const suffix = `_${period.month + 1}_${period.year}`;
                  const suffixShort = `_${period.month + 1}_${String(period.year).slice(-2)}`;
                  
                  // Fetch presets
                  const { data: presets } = await sbClient.from('route_presets').select('*');
                  const currentPresets = {};
                  if (presets) {
                      presets.forEach(p => {
                          const rName = p.route_name || p.name || p.route || 'Unknown';
                          if (rName.includes(suffix) || rName.includes(suffixShort)) {
                              const cleanName = rName.replace(suffix, '').replace(suffixShort, '').trim();
                              currentPresets[cleanName] = { price: p.price, wage: p.wage };
                          }
                      });
                  }
                  routePresets = currentPresets;
              } catch (e) {
                  console.error("Error fetching DB info:", e);
              }
          }

           function getLocalDate() {
               const d = new Date();
               const year = d.getFullYear();
               const month = String(d.getMonth() + 1).padStart(2, '0');
               const day = String(d.getDate()).padStart(2, '0');
               return `${year}-${month}-${day}`;
           }

           // Perform matching and enrichment of AI parsed routes against target presets
           async function performMatchingAndEnrichment() {
               if (!sbClient) return;
               try {
                   const period = getActiveMonthAndYear();
                   let targetMonth = manualMonth !== null ? manualMonth : period.month;
                   let targetYear = manualYear !== null ? manualYear : period.year;

                   const suffix = `_${targetMonth + 1}_${targetYear}`;
                   const suffixShort = `_${targetMonth + 1}_${String(targetYear).slice(-2)}`;

                   const { data: dbPresets } = await sbClient.from('route_presets').select('*');
                   const targetPresets = {};
                   if (dbPresets) {
                       dbPresets.forEach(p => {
                           const rName = p.route_name || p.name || p.route || 'Unknown';
                           if (rName.includes(suffix) || rName.includes(suffixShort)) {
                               const cleanName = rName.replace(suffix, '').replace(suffixShort, '').trim();
                               targetPresets[cleanName] = { price: p.price, wage: p.wage };
                           }
                       });
                   }

                   const enriched = rawAiPresets.map((item, index) => {
                       const cleanRoute = (item.route || '').trim();
                       const matchedPreset = targetPresets[cleanRoute];
                       
                       const wage = matchedPreset ? (parseFloat(matchedPreset.wage) || 0) : 0;
                       
                       return {
                           id: index,
                           date: item.date || getLocalDate(),
                           originalRoute: cleanRoute,
                           matchedRoute: cleanRoute,
                           price: parseFloat(item.price) || 0,
                           wage: wage,
                           selected: true
                       };
                   });

                   parsedTrips = enriched;
               } catch (err) {
                   console.error("Error matching presets:", err);
               }
           }

               const allDrivers = Array.from(document.querySelectorAll('.driver-selector-premium > div')).map(el => el.textContent.trim()).filter(Boolean);

               let monthStatusHtml = `
                   <div style="font-size: 0.82rem; color: var(--text-main); font-weight: 700; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 10px 14px; border-radius: 16px; display: flex; flex-direction: column; gap: 8px; width: 100%;">

                                  throw new Error(err.error || 'Server error during parsing');
                              }

                      </td>
                      <td style="padding: 12px; text-align: right;">
                          <input type="number" class="ai-price-input" data-id="${item.id}" value="${item.price}" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 8px; color: #34d399; font-size: 0.8rem; width: 100px; text-align: right; font-weight: 800;" />
                      </td>
                      <td style="padding: 12px; text-align: right;">
                          <input type="number" class="ai-wage-input" data-id="${item.id}" value="${item.wage}" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 8px; color: #60a5fa; font-size: 0.8rem; width: 100px; text-align: right; font-weight: 800;" />

                  `;

                  tbody.appendChild(tr);
              });

              // Bind checkbox change
              document.querySelectorAll('.ai-item-checkbox').forEach(cb => {
                  cb.onchange = (e) => {
                      const id = parseInt(e.target.dataset.id);
                      const trip = parsedTrips.find(t => t.id === id);
                      if (trip) {
                          trip.selected = e.target.checked;
                          updateTotalSum();
                      }
                  };
              });

              // Bind date change
              document.querySelectorAll('.ai-date-input').forEach(input => {
                  input.onchange = (e) => {
                      const id = parseInt(e.target.dataset.id);
                      const trip = parsedTrips.find(t => t.id === id);
                      if (trip) {
                          trip.date = e.target.value;
                      }

              });

              // Bind text override change
              document.querySelectorAll('.ai-route-override').forEach(input => {

                      const id = parseInt(e.target.dataset.id);
                      const trip = parsedTrips.find(t => t.id === id);

                          trip.matchedRoute = e.target.value;

                  };

              // Bind price change
              document.querySelectorAll('.ai-price-input').forEach(input => {
                  input.onchange = (e) => {

                          trip.price = parseFloat(e.target.value) || 0;
                          updateTotalSum();
                      }
                  };
              });

              // Bind wage change
              document.querySelectorAll('.ai-wage-input').forEach(input => {
                  input.onchange = (e) => {
                      const id = parseInt(e.target.dataset.id);
                      const trip = parsedTrips.find(t => t.id === id);
                      if (trip) {
                          trip.wage = parseFloat(e.target.value) || 0;
                      }
                  };
              });

              updateTotalSum();

              // Bind select all
              const selectAllBtn = document.getElementById('ai-select-all-btn');
              if (selectAllBtn) {
                  selectAllBtn.onclick = () => {
                      parsedTrips.forEach(t => t.selected = true);
                      renderTableRows();
                  };
              }

              // Bind clear all
              const clearAllBtn = document.getElementById('ai-clear-all-btn');
              if (clearAllBtn) {
                  clearAllBtn.onclick = () => {
                      parsedTrips.forEach(t => t.selected = false);
                      renderTableRows();
                  };
              }

              // Sync Button Click
               const syncBtn = document.getElementById('ai-sync-btn');
               if (syncBtn) {
                   syncBtn.onclick = async () => {
                       const selectedItems = parsedTrips.filter(t => t.selected);
                       if (selectedItems.length === 0) {
                           alert('กรุณาเลือกรายการที่ต้องการบันทึกอย่างน้อย 1 รายการครับ');
                           return;
                       }

                       const finalDriver = manualDriver || activeDriverName;
                       if (!finalDriver) {
                           alert('กรุณาเลือกพนักงานขับรถก่อนบันทึกข้อมูลครับ');
                           return;
                       }

                       const confirmMsg = `ต้องการบันทึกรายการเที่ยววิ่งของ "${finalDriver}" จำนวน ${selectedItems.length} รายการ เข้าระบบใช่หรือไม่? (ยอดรวม ฿${selectedItems.reduce((acc, t) => acc + t.price, 0).toLocaleString()})`;
                       if (!confirm(confirmMsg)) return;

                       isLoading = true;
                       loadingStage = 'กำลังบันทึกตารางเที่ยววิ่งเข้าฐานข้อมูล Supabase...';
                       renderImporterUI();

                       try {
                           let successCount = 0;
                           let failedCount = 0;

                           for (const item of selectedItems) {
                               const payload = {
                                   date: item.date,
                                   route: item.matchedRoute.trim(),
                                   driver_name: finalDriver,
                                   price: parseFloat(item.price) || 0,
                                   wage: parseFloat(item.wage) || 0,
                                   fuel: 0,
                                   basket: 0,
                                   maintenance: 0,
                                   advance: 0,
                                   staff_share: 0,
                                   basket_count: 0
                               };

                               const { error: insertErr } = await sbClient.from('trips').insert([payload]);
                               if (insertErr) {
                                   console.error("Error inserting trip:", insertErr);
                                   failedCount++;
                               } else {
                                   successCount++;
                               }
                           }

                           syncResult = { updatedCount: successCount, failedCount };
                           parsedTrips = [];
                           selectedFile = null;
                           detectedMonth = null;
                           detectedYear = null;
                           rawAiPresets = [];

                           alert(`บันทึกข้อมูลเที่ยววิ่งสำเร็จ ${successCount} เที่ยว! (ล้มเหลว ${failedCount} เที่ยว)`);
                           window.location.reload();

                       } catch (err) {
                           console.error(err);
                           alert(`เกิดข้อผิดพลาดในการซิงก์ข้อมูล: ${err.message}`);
                       } finally {
                           isLoading = false;
                           loadingStage = '';
                           renderImporterUI();
                       }
                   };
               }
          }

          function updateTotalSum() {
              const totalEl = document.getElementById('ai-total-price');
              if (!totalEl) return;
              const sum = parsedTrips.filter(t => t.selected).reduce((acc, t) => acc + t.price, 0);
              totalEl.textContent = '฿' + sum.toLocaleString('th-TH');
          }

          // Main View Sync Loop
          let lastActiveMonthStr = '';
          function syncSettingsAiImporter() {
              initSupabase();
              
              // Search for the "สรุปพนักงาน" title div
              const divs = Array.from(document.querySelectorAll('div'));
              const targetTitle = divs.find(el => el.textContent.trim() === 'สรุปพนักงาน');
              
              if (!targetTitle) {
                  lastActiveMonthStr = '';
                  const oldContainer = document.getElementById('custom-ai-settings-card');
                  if (oldContainer) {
                      oldContainer.remove();
                  }
                  return;
              }

              const driverSelector = document.querySelector('.driver-selector-premium');
              if (!driverSelector) return;

              // Check if month changed
              const period = getActiveMonthAndYear();
              const periodStr = `${period.month}_${period.year}`;
              const monthChanged = lastActiveMonthStr && lastActiveMonthStr !== periodStr;

              let aiCard = document.getElementById('custom-ai-settings-card');
              if (!aiCard) {
                  aiCard = document.createElement('div');
                  aiCard.id = 'custom-ai-settings-card';
                  aiCard.style.cssText = 'width: 100%; display: flex; flex-direction: column; gap: 1.5rem; margin-top: 0.5rem; margin-bottom: 1.5rem;';
                  aiCard.innerHTML = `<div id="ai-importer-content"></div>`;
                  
                  // Insert BEFORE the driver selector
                  driverSelector.parentNode.insertBefore(aiCard, driverSelector);
                  lastActiveMonthStr = periodStr;
                  renderImporterUI();
                  
                  fetchDBInfo().then(() => {
                      renderImporterUI();
                  }).catch(e => console.error("Error loading DB info on mount:", e));
              } else {
                  if (aiCard.nextElementSibling !== driverSelector) {
                      driverSelector.parentNode.insertBefore(aiCard, driverSelector);
                  }
                  
                  if (monthChanged) {
                      lastActiveMonthStr = periodStr;
                      parsedTrips = [];
                      selectedFile = null;
                      syncResult = null;
                      detectedMonth = null;
                      detectedYear = null;
                      manualMonth = null;
                      manualYear = null;
                      fetchDBInfo().then(() => {
                          renderImporterUI();
                      });
                  } else if (!document.getElementById('ai-importer-content').innerHTML) {
                      renderImporterUI();
                      fetchDBInfo().then(() => {
                          renderImporterUI();
                      }).catch(e => console.error("Error reloading DB info:", e));
                  }
              }
          }

          // Run tab states and fullscreen features periodically
           setInterval(() => {
              if (window.location.hash.includes('admin')) {
                  document.body.classList.add('admin-page-active');
              } else {
                  document.body.classList.remove('admin-page-active');
              }
              syncSettingsAiImporter();

              // Fullscreen button
              document.querySelectorAll('.trip-log-card').forEach(card => {
                  if (card.dataset.fsBtn) return;
                  card.dataset.fsBtn = "1";
                  card.style.position = 'relative';
                  const btn = document.createElement('button');
                  btn.textContent = '⛶ ขยายเต็มจอ';
                  btn.style.cssText = 'position:absolute;top:12px;right:15px;z-index:1000;background:#f1f5f9;color:#475569;border:1px solid #cbd5e1;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:bold;cursor:pointer;';
                  btn.onclick = () => {
                      if (!document.fullscreenElement) {
                          card.requestFullscreen().catch(()=>{});
                          btn.textContent = '✖ ย่อหน้าจอ';
                      } else {
                          document.exitFullscreen();
                      }
                  };
                  card.appendChild(btn);
              });
              if (!document.fullscreenElement) {
                  document.querySelectorAll('button').forEach(btn => {
                      if (btn.textContent.includes('ย่อหน้าจอ')) btn.textContent = '⛶ ขยายเต็มจอ';
                  });
              }

              // Fix negative values
              document.querySelectorAll('.trip-log-table-container tbody tr.table-row-hover').forEach(row => {
                  if (row.dataset.fixedNeg) return;
                  for (let i = 3; i <= 9; i++) {
                      const td = row.cells[i];
                      if (!td) continue;
                      const span = td.querySelector('span');
                      if (span) {
                          let txt = span.textContent.trim();
                          if (txt.startsWith('-') && txt !== '-') {
                              span.textContent = txt.replace(/^-/, '');
                          }
                      }
                  }
                  row.dataset.fixedNeg = "1";
              });
          }, 1200);
      });
    </script>
    
</body>

</html>
